<script>

// ======================
// DATA PIKET
// ======================
const piket={
  Senin:["Steven Agustino","Lewis","Kaka Morenlo","Novita","Angela Natalie","Felicia Eza M.","Cherise Everlyn"],
  Selasa:["Gregorius Yasera B.","Meylani Catherine","Michael Steven C.K.C","Calista Gabriela M.","Ailennia Aretha","Rhys Clayton"],
  Rabu:["Valentino I.","Sandy","Lu Falensia W.","Viktoria Clara","Aurellia Latishia W.","Santo Wijaya"],
  Kamis:["Elisa Agatha","Luvia Valens","Juliana Silvia","Erick Castiandy","Jeremiah Claudius M.","Delvin Juan Putra"],
  Jumat:["Albert Steven","Gabriel Ibanez K.","Hernan Fransisko","Marcelia","Elsama Jhelisca","Cindy Gracelia L.","Callysta Christabel"],
  Sabtu:["Ningsi Oktagrillislia","Elrica Chloe","Lenggo Alfredo","Dominic Bianca L.","Beny","Ceryl Arueputri"]
};

// ======================
// DATA TUGAS (Format wajib YYYY-MM-DD)
// ======================
let tugas=[
  {mapel:"Matematika",deskripsi:"PR Persamaan Kuadrat",deadline:"2026-03-28"},
  {mapel:"B.Inggris",deskripsi:"Presentasi Cerita",deadline:"2026-03-27"},
  {mapel:"Geografi",deskripsi:"Latihan Pemahaman",deadline:"2026-03-29"}
];

// ======================
// TANGGAL
// ======================
const today=new Date();
const hari=today.toLocaleDateString("id-ID",{weekday:"long"});
const tanggal=today.toLocaleDateString("id-ID",{dateStyle:"full"});
document.getElementById("tanggal").innerText=tanggal;

// ======================
// TAMPILKAN PIKET
// ======================
const piketList=document.getElementById("piket");
if(piket[hari]){
  piket[hari].forEach(nama=>{
    let li=document.createElement("li");
    li.textContent=nama;
    piketList.appendChild(li);
  });
}

// ======================
// TAMPILKAN TUGAS
// ======================
const taskContainer=document.getElementById("tasks");

function tampilkanTugas(){
  taskContainer.innerHTML="";
  tugas.forEach(t=>{
    let div=document.createElement("div");
    div.className="task";
    div.innerHTML=`
      <h4>${t.mapel}</h4>
      <p>${t.deskripsi}</p>
      <small>DL: ${t.deadline}</small>
    `;
    taskContainer.appendChild(div);
  });
}

function tambahTugas(){
  let mapel=prompt("Nama mapel:");
  let des=prompt("Deskripsi tugas:");
  let dl=prompt("Deadline (format: 2026-03-30):");
  tugas.push({mapel:mapel,deskripsi:des,deadline:dl});
  tampilkanTugas();
}

tampilkanTugas();

// ======================
// AI ASSISTANT SYSTEM
// ======================

function bunyiNotif(){
  let audio=new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
  audio.play();
}

function tampilkanAIpesan(pesan){
  alert("🤖 Schedulo AI:\n\n"+pesan);
  bunyiNotif();
}

function cekDeadlineAI(){
  tugas.forEach(t=>{
    let deadline=new Date(t.deadline);
    let selisih=Math.ceil((deadline-today)/(1000*60*60*24));

    if(selisih<=4 && selisih>=1){
      tampilkanAIpesan(
        `Tugas ${t.mapel} akan deadline dalam ${selisih} hari!\nSegera kerjakan ya 🔥`
      );
    }

    if(selisih===0){
      tampilkanAIpesan(
        `Hari ini deadline ${t.mapel}!\nJANGAN LUPA DIKUMPULKAN 🚨`
      );
    }
  });
}

function cekPiketAI(){
  if(piket[hari]){
    tampilkanAIpesan(
      `Hari ini jadwal piket!\n\nPetugas:\n${piket[hari].join(", ")}`
    );
  }
}

// ======================
// JALANKAN AI OTOMATIS
// ======================

window.onload=function(){
  cekDeadlineAI();
  cekPiketAI();
};

</script>
